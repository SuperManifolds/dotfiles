---
- name: Include Arch variables
  ansible.builtin.include_vars: arch.yml

# Install pacman packages (official repos)
- name: Install pacman packages
  community.general.pacman:
    name: "{{ pacman_packages }}"
    state: present
  become: true

# Passwordless sudo for the wheel group
- name: Enable passwordless sudo for wheel group
  ansible.builtin.copy:
    dest: /etc/sudoers.d/10-nopasswd-wheel
    content: "%wheel ALL=(ALL:ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: visudo -cf %s
  become: true

# Deploy keyd system config
- name: Deploy keyd default config
  ansible.builtin.copy:
    src: keyd-default.conf
    dest: /etc/keyd/default.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Reload keyd

# Install AUR packages via paru
- name: Install AUR packages
  kewlfft.aur.aur:
    use: paru
    name: "{{ aur_packages }}"
    state: present

# Set Rust default toolchain
- name: Install Rust stable toolchain
  ansible.builtin.command:
    cmd: rustup default stable
  changed_when: true

# Dev tools (via mise)
- name: Install tools via mise
  ansible.builtin.command:
    cmd: "mise use -g {{ item }}"
  loop:
    - kind
    - stern
    - skaffold
    - golangci-lint
  changed_when: true

# NPM global packages
- name: Install global NPM packages
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  loop: "{{ npm_packages }}"
  become: true
  when: npm_packages | length > 0

# Go packages
- name: Install Go packages
  ansible.builtin.command:
    cmd: "go install {{ item }}"
  environment:
    GOPATH: "{{ ansible_env.HOME }}/go"
    PATH: "{{ ansible_env.PATH }}:{{ ansible_env.HOME }}/go/bin"
  loop: "{{ go_packages }}"
  changed_when: true

# NVIDIA DPMS wake / monitor-not-turning-back-on mitigations. Only applies
# if an NVIDIA GPU is present; safe to run repeatedly.
- name: Detect NVIDIA GPU
  ansible.builtin.shell: "lspci | grep -i 'VGA.*NVIDIA' || true"
  register: nvidia_check
  changed_when: false

- name: Preserve NVIDIA video memory across suspend/DPMS
  ansible.builtin.copy:
    dest: /etc/modprobe.d/nvidia-power.conf
    content: |
      # Preserve video memory across sleep/DPMS to prevent monitor wake issues
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
      options nvidia NVreg_TemporaryFilePath=/var/tmp
    owner: root
    group: root
    mode: '0644'
  become: true
  when: nvidia_check.stdout | length > 0
  notify: Rebuild initramfs

- name: Enable NVIDIA suspend/resume/hibernate services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - nvidia-suspend.service
    - nvidia-resume.service
    - nvidia-hibernate.service
  become: true
  when: nvidia_check.stdout | length > 0

# Enable mDNS (.local) name resolution so avahi-discovered hosts (SMB shares,
# Macs advertising Bonjour, etc.) can be addressed by .local hostname.
- name: Enable mdns_minimal in /etc/nsswitch.conf
  ansible.builtin.replace:
    path: /etc/nsswitch.conf
    regexp: '^(hosts:\s+(?:(?!mdns_minimal).)*?)\bresolve\b'
    replace: '\1mdns_minimal [NOTFOUND=return] resolve'
  become: true

- name: Enable avahi-daemon
  ansible.builtin.systemd:
    name: avahi-daemon.service
    enabled: true
    state: started
  become: true

# Docker setup
- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_env.USER }}"
    groups: docker
    append: true
  become: true

# keyd socket is owned root:keyd mode 660 — user needs keyd group for
# keyd-application-mapper to connect to /var/run/keyd.socket
- name: Add user to keyd group
  ansible.builtin.user:
    name: "{{ ansible_env.USER }}"
    groups: keyd
    append: true
  become: true

- name: Enable and start docker service
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
    state: started
  become: true
