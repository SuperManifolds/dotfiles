---
- name: Include macOS tasks
  ansible.builtin.include_tasks: macos.yml
  when: ansible_os_family == "Darwin"

- name: Include Fedora tasks
  ansible.builtin.include_tasks: fedora.yml
  when: ansible_distribution == "Fedora"

- name: Include Fedora desktop tasks
  ansible.builtin.include_tasks: fedora-desktop.yml
  when:
    - ansible_distribution == "Fedora"
    - install_desktop | default(true)

- name: Include Arch tasks
  ansible.builtin.include_tasks: arch.yml
  when: ansible_os_family == "Archlinux"

- name: Include Arch desktop tasks
  ansible.builtin.include_tasks: arch-desktop.yml
  when:
    - ansible_os_family == "Archlinux"
    - install_desktop | default(true)
