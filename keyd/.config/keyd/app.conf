# keyd per-application overrides
# Any binding from /etc/keyd/default.conf can be overridden here per window class.
# Discover a window's class by running:  keyd-application-mapper -v

[com.mitchellh.ghostty]

# Right-Super = tmux prefix instead of hyper
rightmeta = C-space

# Meh+C/V = terminal copy/paste (otherwise Ctrl+Alt+Shift+C/V does nothing in terminal)
meh.c = C-S-c
meh.v = C-S-v

# Super+C/V in Ghostty = terminal copy/paste (Ctrl+Shift+C/V) — overrides main config's
# global Super+C/V = Ctrl+C/V, which would fire SIGINT / literal-next in a terminal.
meta.c = C-S-c
meta.v = C-S-v
